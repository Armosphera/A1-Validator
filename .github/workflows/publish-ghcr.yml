name: Build and push Docker image to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/armosphera/a1-validator
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Single-arch (linux/amd64) build using plain `docker build`. v0.1.0
      # uses amd64 only — multi-arch (amd64+arm64) was attempted with
      # docker/build-push-action@v6 but the buildx cache-key computation
      # had an intermittent "/README.md not found" error on COPY steps
      # (the same input would fail then succeed on retry). Plain
      # `docker build` avoids buildx entirely. Multi-arch can be added
      # back in v0.2.0 once the buildx cache-key bug is fixed upstream
      # (https://github.com/moby/buildkit / https://github.com/docker/buildx).
      - name: Build and push (single arch)
        env:
          TAG_LIST: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # Build a space-separated tag list for `docker tag`
          TAGS_SPACE=$(echo "$TAG_LIST" | tr '\n' ' ')
          echo "Building image with tags: $TAGS_SPACE"
          # Strip the leading 'v' from the tag (e.g. v0.1.5 → 0.1.5) so the
          # Dockerfile's `ARG VERSION=...` matches the wheel built by
          # `python -m build` inside the builder stage.
          VERSION="${GITHUB_REF_NAME#v}"
          docker build \
            --tag "ghcr.io/armosphera/a1-validator:build-tmp" \
            --build-arg "VERSION=${VERSION}" \
            --label org.opencontainers.image.title=a1-validator \
            --label org.opencontainers.image.description="23 SBOSS sovereign business ID validators" \
            --label org.opencontainers.image.source=https://github.com/Armosphera/A1-Validator \
            --label org.opencontainers.image.licenses=Armosphera-Proprietary \
            --label org.opencontainers.image.version=${{ github.ref_name }} \
            .
          # Re-tag and push for each requested tag
          for TAG in $TAGS_SPACE; do
            echo "Tagging and pushing: $TAG"
            docker tag "ghcr.io/armosphera/a1-validator:build-tmp" "$TAG"
            if [ "${{ github.event_name }}" = 'push' ]; then
              docker push "$TAG"
            fi
          done
          docker rmi "ghcr.io/armosphera/a1-validator:build-tmp" || true
