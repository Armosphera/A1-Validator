name: Build and push dev image to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: false  # disabled 2026-06-21 — repo is private, local CI in ~/dev/armosphera/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/armosphera/a1-validator
          tags: |
            type=raw,value=dev
            type=raw,value=main
            type=sha,format=short

      - name: Build and push (single arch)
        env:
          TAG_LIST: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          TAGS_SPACE=$(echo "$TAG_LIST" | tr '\n' ' ')
          # Read the version from pyproject.toml (not the tag — dev image
          # is built from main, not from a v* tag, so there's no GITHUB_REF_NAME
          # version to strip). The Dockerfile's `ARG VERSION=...` must match
          # the wheel built by `python -m build` inside the builder.
          VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml').read())['project']['version'])")
          echo "Building dev image (version=${VERSION}) with tags: $TAGS_SPACE"
          docker build \
            --tag "ghcr.io/armosphera/a1-validator:dev-tmp" \
            --build-arg "VERSION=${VERSION}" \
            --label org.opencontainers.image.title=a1-validator \
            --label org.opencontainers.image.description="23 SBOSS sovereign business ID validators — DEV build" \
            --label org.opencontainers.image.source=https://github.com/Armosphera/A1-Validator \
            --label org.opencontainers.image.licenses=Armosphera-Proprietary \
            --label org.opencontainers.image.version=dev-${{ github.sha }} \
            .
          for TAG in $TAGS_SPACE; do
            echo "Tagging and pushing: $TAG"
            docker tag "ghcr.io/armosphera/a1-validator:dev-tmp" "$TAG"
            docker push "$TAG"
          done
          docker rmi "ghcr.io/armosphera/a1-validator:dev-tmp" || true
