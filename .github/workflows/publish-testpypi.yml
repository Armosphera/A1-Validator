# .github/workflows/publish-testpypi.yml
#
# Publish a1-validator to TestPyPI on tag push.
#
# Safety: only `v0.1.0*` tags are allowed to trigger this workflow. The
# v0.1.0 family is the first published version family for this package
# and we're scoping the trigger tight while we shake out the publishing
# pipeline. Once v0.1.1+ lands, widen the pattern to `v*` (and update
# `publish-ghcr.yml` analogously).
#
# Manual trigger: workflow_dispatch lets an operator push a build without
# cutting a tag — useful when iterating on the workflow itself.
#
# Required repository secrets:
#   TESTPYPI_API_TOKEN — API token from https://test.pypi.org/manage/account/token/
#                        (scope: "Project: a1-validator")
#
# The workflow does NOT actually publish on every push — the `if` clause
# gates execution on the tag pattern, so opening a PR or merging to main
# will not trigger it.

name: publish-testpypi

on:
  push:
    tags:
      # Safety scope: only the v0.1.0 family for now.
      - "v0.1.0*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      # Required secrets are configured on this environment in repo
      # settings — the workflow inherits them automatically.
      name: testpypi
      url: https://test.pypi.org/project/a1-validator/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository_url: https://test.pypi.org/legacy/
          packages_dir: dist/
          # Skip the existing-version check on TestPyPI — pre-existing
          # uploads from earlier tag pushes shouldn't block re-runs.
          skip_existing: false
