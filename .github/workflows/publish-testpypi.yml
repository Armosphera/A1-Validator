# .github/workflows/publish-testpypi.yml
#
# Publish a1-validator to TestPyPI on tag push.
#
# Auth: PyPI API token (set by scripts/setup_pypi_token.sh as the
# TEST_PYPI_TOKEN secret in the 'testpypi' GitHub environment).
# The token must be scoped to project 'a1-validator' on TestPyPI.
#
# Trigger: tag push matching 'v0.1.0*' (safe scope for v0.1.x; widen to
# 'v*' for v0.2.0+). Manual `workflow_dispatch` lets an operator push
# without cutting a tag.
#
# Why twine (not pypa/gh-action-pypi-publish): the pypa action defaults
# to OIDC "provenance attestations" and the OIDC failure path is fatal
# even when TWINE_PASSWORD is set in env. Twine is bulletproof: no
# OIDC dance, no action version drift, no attestation noise. The
# trade-off is no SLSA provenance attestation, which we don't need
# for an internal/early-stage release.
#
# Why a token (not OIDC trusted publishing): the trusted-publisher
# registration step requires browser + 2FA and can't be scripted. The
# token path trades that one-time web step for a one-time terminal
# command (`./scripts/setup_pypi_token.sh <token> test`). The workflow
# then runs fully automated on every tag.

name: publish-testpypi

on:
  push:
    tags:
      # Safety scope: only the v0.1.0 family for now.
      - "v0.1.0*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + twine
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      # TEST_PYPI_TOKEN is configured on this environment in repo
      # settings — the workflow inherits it automatically. Use
      # scripts/setup_pypi_token.sh to set it.
      name: testpypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        # Each job runs in a fresh container — pip packages from the build
        # job don't carry over. Install twine in the publish job too.
        run: python -m pip install --upgrade twine

      - name: Publish to TestPyPI via twine
        env:
          # The token lives in the 'testpypi' GitHub environment's
          # TEST_PYPI_TOKEN secret, not as a repo-wide secret.
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          set -euo pipefail
          python -m twine upload \
            --repository-url https://test.pypi.org/legacy/ \
            --non-interactive \
            --skip-existing \
            --verbose \
            dist/*
