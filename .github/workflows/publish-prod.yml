# .github/workflows/publish-prod.yml
#
# Publish a1-validator to production PyPI on tag push.
#
# Auth: PyPI API token (set by scripts/setup_pypi_token.sh as the
# PYPI_TOKEN secret in the 'prod' GitHub environment). The token must
# be scoped to project 'a1-validator' on production PyPI.
#
# Trigger: tag push matching v0.1.0* (safe scope for v0.1.x; widen
# to v* for v0.2.0+).
#
# Safety: the 'prod' GitHub environment should be configured with
# required reviewers (Settings → Environments → prod → Required
# reviewers) so a human must click "Approve" before this workflow
# can publish. That prevents accidental prod publishes from a
# bad v* tag push.
#
# Why a separate workflow (not just changing the URL in
# publish-testpypi.yml): keeping the two registries on separate
# workflows + environments means a single workflow file doesn't
# need to know about both registries, and a misconfigured trigger
# can't accidentally publish to prod.

name: publish-prod

on:
  push:
    tags:
      # Widen to v* for v0.2.0+ (matches publish-testpypi.yml).
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: false  # disabled 2026-06-21 — repo is private, local CI in ~/dev/armosphera/
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + twine
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: false  # disabled 2026-06-21 — repo is private, local CI in ~/dev/armosphera/
    name: Publish to production PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      # PYPI_TOKEN is configured on this environment in repo
      # settings — the workflow inherits it automatically. Use
      # scripts/setup_pypi_token.sh to set it.
      #
      # Configure required reviewers in repo Settings to gate
      # production publishes on a manual click-through.
      name: prod
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        # Each job runs in a fresh container — pip packages from the build
        # job don't carry over. Install twine in the publish job too.
        run: python -m pip install --upgrade twine

      - name: Publish to production PyPI via twine
        env:
          # The token lives in the 'prod' GitHub environment's
          # PYPI_TOKEN secret, not as a repo-wide secret.
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail
          python -m twine upload \
            --non-interactive \
            --skip-existing \
            --verbose \
            dist/*
